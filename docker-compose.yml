version: '3.8'

services:
  db:
    image: mysql:5.7
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: c2101314_testing
      MYSQL_USER: c2101314_testing
      MYSQL_PASSWORD: nekesuBU83
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  web:
    build: .
    ports:
      - "10880:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=c2101314_testing
      - DB_USERNAME=c2101314_testing
      - DB_PASSWORD=nekesuBU83
    depends_on:
      - db
    restart: unless-stopped

volumes:
  db_data:
